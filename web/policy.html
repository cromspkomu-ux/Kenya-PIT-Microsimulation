<div id="policy-root">
  <p style="margin-top:0;color:#333">
    Select a parameter, choose one or more year/value pairs, add additional change lines if needed,
    then click <strong>Generate Revenue under Reform</strong>.
  </p>

  <div id="policy-controls">
    <div id="changesContainer"></div>

    <div style="margin-top:8px;">
      <button id="addRow">+ Add change</button>
      <button id="resetAll">Reset</button>
    </div>

    <div style="margin-top:12px;">
      <button id="runReform">Generate Revenue under Reform</button>
      <span id="status" style="margin-left:12px"></span>
    </div>
  </div>

  <div id="result"></div>
</div>
